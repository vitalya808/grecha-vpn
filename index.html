<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Греча VPN — Мобильный Клиент</title>
    <!-- Подключаем шрифты и иконки -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-brown: #8B4513;
            --accent-orange: #E29B52;
            --dark-bg: #0F0F0F;
            --card-bg: #1A1A1A;
        }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Контейнер приложения */
        .app-shell {
            width: 100%;
            max-width: 430px;
            height: 100%;
            background: var(--dark-bg);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Страницы */
        .page {
            position: absolute;
            inset: 0;
            padding: 20px;
            padding-top: 70px;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
            display: flex;
            flex-direction: column;
            background: var(--dark-bg);
        }

        .page.hidden {
            transform: translateY(20px);
            opacity: 0;
            pointer-events: none;
        }

        /* Кнопка питания */
        .power-orbit {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            border: 2px dashed rgba(139, 69, 19, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin: 40px auto;
        }

        .power-button {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(145deg, #8B4513, #5D3A1A);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
            z-index: 10;
            border: 4px solid rgba(255,255,255,0.05);
        }

        .power-button.active {
            background: linear-gradient(145deg, #16a34a, #15803d);
            box-shadow: 0 0 50px rgba(22, 163, 74, 0.4);
            transform: scale(1.05);
        }

        /* Пульсация */
        .ripple {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: var(--primary-brown);
            opacity: 0;
            z-index: 1;
        }

        .active + .ripple {
            animation: ripple-effect 2s infinite;
        }

        @keyframes ripple-effect {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.7); opacity: 0; }
        }

        /* Навигация */
        .nav-bar {
            height: 85px;
            background: rgba(20, 20, 20, 0.98);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 15px;
            z-index: 100;
        }

        .nav-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: #555;
            font-size: 11px;
            font-weight: 700;
            transition: 0.3s;
        }

        .nav-btn.active { color: var(--accent-orange); }

        .glass-card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 18px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .loader {
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="app-shell">
        
        <!-- Header -->
        <div class="absolute top-0 w-full px-6 pt-6 flex justify-between items-center z-50">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-bowl-food text-amber-700 text-2xl"></i>
                <span class="font-black text-lg tracking-tighter italic">ГРЕЧА VPN</span>
            </div>
            <div id="status-badge" class="px-3 py-1 rounded-full bg-white/5 border border-white/10 text-[9px] font-black text-gray-500 uppercase">
                Offline
            </div>
        </div>

        <!-- ГЛАВНЫЙ ЭКРАН -->
        <div id="home-page" class="page">
            <div class="text-center mt-6">
                <h2 id="status-title" class="text-2xl font-extrabold">Готов к работе</h2>
                <p class="text-gray-500 text-xs mt-1">IP: <span id="user-ip">...</span></p>
            </div>

            <div class="power-orbit">
                <div id="p-btn" onclick="toggleConnection()" class="power-button">
                    <div id="btn-loader" class="loader hidden mb-2"></div>
                    <i id="p-icon" class="fa-solid fa-power-off text-3xl mb-1"></i>
                    <span id="p-text" class="text-[9px] font-black uppercase tracking-widest">Connect</span>
                </div>
                <div class="ripple"></div>
            </div>

            <!-- Статистика -->
            <div id="stats" class="grid grid-cols-2 gap-3 opacity-20 transition-opacity duration-500">
                <div class="glass-card">
                    <span class="text-[9px] font-bold text-gray-500 uppercase">Download</span>
                    <div class="text-xl font-black mt-1"><span id="speed-down">0.0</span> <small class="text-[10px] text-amber-600">Mb/s</small></div>
                </div>
                <div class="glass-card">
                    <span class="text-[9px] font-bold text-gray-500 uppercase">Upload</span>
                    <div class="text-xl font-black mt-1"><span id="speed-up">0.0</span> <small class="text-[10px] text-amber-600">Mb/s</small></div>
                </div>
            </div>

            <!-- Выбор сервера -->
            <div class="mt-auto mb-4">
                <div onclick="showServers()" class="glass-card flex items-center justify-between active:scale-95 transition-transform cursor-pointer">
                    <div class="flex items-center gap-4">
                        <span id="srv-flag" class="text-2xl">🇳🇱</span>
                        <div>
                            <p class="text-[9px] text-gray-500 font-bold uppercase">Активный узел</p>
                            <p id="srv-name" class="font-bold text-sm">Netherlands, Amsterdam</p>
                        </div>
                    </div>
                    <i class="fa-solid fa-angle-right text-gray-600"></i>
                </div>
            </div>
        </div>

        <!-- СПИСОК СЕРВЕРОВ -->
        <div id="server-page" class="page hidden overflow-y-auto">
            <div class="flex items-center gap-4 mb-6">
                <button onclick="showHome()" class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <h2 class="text-xl font-extrabold">Выбор локации</h2>
            </div>
            <div id="list-container" class="space-y-3">
                <!-- JS render -->
            </div>
        </div>

        <!-- Навигация -->
        <nav class="nav-bar">
            <button onclick="showHome()" id="n-home" class="nav-btn active">
                <i class="fa-solid fa-house-user text-xl"></i>
                <span>Главная</span>
            </button>
            <button onclick="showServers()" id="n-srv" class="nav-btn">
                <i class="fa-solid fa-server text-xl"></i>
                <span>Сервера</span>
            </button>
            <button class="nav-btn opacity-30">
                <i class="fa-solid fa-gear text-xl"></i>
                <span>Опции</span>
            </button>
        </nav>
    </div>

    <script>
        let connected = false;
        let speedTimer;

        const serverData = [
            { id: 1, name: 'Netherlands, Amsterdam', flag: '🇳🇱', ping: '32ms' },
            { id: 2, name: 'Germany, Frankfurt', flag: '🇩🇪', ping: '41ms' },
            { id: 3, name: 'USA, New York', flag: '🇺🇸', ping: '108ms' },
            { id: 4, name: 'Turkey, Istanbul', flag: '🇹🇷', ping: '55ms' }
        ];

        window.onload = () => {
            renderServers();
            fetch('https://api.ipify.org?format=json')
                .then(res => res.json())
                .then(data => document.getElementById('user-ip').innerText = data.ip)
                .catch(() => document.getElementById('user-ip').innerText = '109.252.xx.xx');
        };

        function renderServers() {
            const container = document.getElementById('list-container');
            container.innerHTML = serverData.map(s => `
                <div onclick="selectServer(${s.id})" class="glass-card flex justify-between items-center active:bg-white/5 transition-colors">
                    <div class="flex items-center gap-4">
                        <span class="text-2xl">${s.flag}</span>
                        <div>
                            <p class="font-bold text-sm text-white">${s.name}</p>
                            <p class="text-[9px] text-green-500 font-bold uppercase tracking-widest">Online • WSS</p>
                        </div>
                    </div>
                    <span class="text-xs font-mono text-gray-500">${s.ping}</span>
                </div>
            `).join('');
        }

        function toggleConnection() {
            const btn = document.getElementById('p-btn');
            const icon = document.getElementById('p-icon');
            const loader = document.getElementById('btn-loader');
            const text = document.getElementById('p-text');
            const badge = document.getElementById('status-badge');
            const title = document.getElementById('status-title');

            if (!connected) {
                icon.classList.add('hidden');
                loader.classList.remove('hidden');
                text.innerText = "Connecting";
                
                setTimeout(() => {
                    connected = true;
                    loader.classList.add('hidden');
                    icon.classList.remove('hidden');
                    icon.className = "fa-solid fa-shield-check text-3xl mb-1";
                    btn.classList.add('active');
                    text.innerText = "Stop";
                    title.innerText = "Подключено";
                    title.classList.add('text-green-500');
                    badge.innerText = "Protected";
                    badge.className = "px-3 py-1 rounded-full bg-green-500/10 border border-green-500/20 text-[9px] font-black text-green-500 uppercase";
                    document.getElementById('stats').classList.remove('opacity-20');
                    startSpeedSim();
                }, 1200);
            } else {
                connected = false;
                btn.classList.remove('active');
                icon.className = "fa-solid fa-power-off text-3xl mb-1";
                text.innerText = "Connect";
                title.innerText = "Готов к работе";
                title.classList.remove('text-green-500');
                badge.innerText = "Offline";
                badge.className = "px-3 py-1 rounded-full bg-white/5 border border-white/10 text-[9px] font-black text-gray-500 uppercase";
                document.getElementById('stats').classList.add('opacity-20');
                clearInterval(speedTimer);
            }
        }

        function startSpeedSim() {
            speedTimer = setInterval(() => {
                document.getElementById('speed-down').innerText = (Math.random() * 45 + 5).toFixed(1);
                document.getElementById('speed-up').innerText = (Math.random() * 12 + 1).toFixed(1);
            }, 2000);
        }

        function showServers() {
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('server-page').classList.remove('hidden');
            document.getElementById('n-home').classList.remove('active');
            document.getElementById('n-srv').classList.add('active');
        }

        function showHome() {
            document.getElementById('server-page').classList.add('hidden');
            document.getElementById('home-page').classList.remove('hidden');
            document.getElementById('n-srv').classList.remove('active');
            document.getElementById('n-home').classList.add('active');
        }

        function selectServer(id) {
            const s = serverData.find(x => x.id === id);
            document.getElementById('srv-flag').innerText = s.flag;
            document.getElementById('srv-name').innerText = s.name;
            if(connected) toggleConnection();
            showHome();
        }
    </script>
</body>
</html>
